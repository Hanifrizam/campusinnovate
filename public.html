<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Publik Organisasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --theme-color: #0A3055; --bg: #f3f6f9; --text: #2d3436; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; scroll-behavior: smooth;}

        /* HERO MODERN & GRADIENT */
        .hero { 
            background: linear-gradient(135deg, var(--theme-color), #2c3e50); 
            color: white; 
            padding: 120px 20px 100px; 
            text-align: center; 
            position: relative;
            overflow: hidden;
        }
        /* Dekorasi Lingkaran Abstrak di Background Hero */
        .hero::before { content:''; position:absolute; top:-50%; left:-10%; width:400px; height:400px; background:rgba(255,255,255,0.05); border-radius:50%; }
        .hero::after { content:''; position:absolute; bottom:-20%; right:-10%; width:300px; height:300px; background:rgba(255,255,255,0.05); border-radius:50%; }
        
        .hero h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 20px; text-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative; z-index: 2; line-height: 1.2;}
        .hero p { font-size: 1.2rem; opacity: 0.9; max-width: 700px; margin: 0 auto; line-height: 1.7; position: relative; z-index: 2;}

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        
        /* GENERAL WIDGET SPACING */
        .page-block { margin-top: 50px; margin-bottom: 50px; animation: slideUp 0.8s cubic-bezier(0.165, 0.84, 0.44, 1); }
        
        /* ABOUT BOX (GLASSMORPHISM TEXT) */
        .about-box { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            padding: 50px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            margin-top: -60px; 
            position: relative; 
            z-index: 10; 
            text-align: center; 
            border-top: 5px solid var(--theme-color);
        }
        
        /* SECTION TITLES */
        .section-title { font-size: 1.8rem; color: var(--theme-color); margin-bottom: 30px; display: flex; align-items: center; gap: 15px; font-weight: 800;}
        .section-title::after { content:''; flex:1; height:2px; background: linear-gradient(90deg, var(--theme-color), transparent); opacity: 0.2; }

        /* FINANCE WIDGET */
        .finance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: center; }
        .finance-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border-left: 6px solid var(--theme-color); transition: transform 0.3s;}
        .finance-card:hover { transform: translateY(-5px); }
        .finance-card h3 { color: #888; font-size: 0.95rem; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}
        .finance-card .amount { font-size: 2.2rem; font-weight: 800; color: var(--theme-color); }
        .chart-container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); height: 280px; display: flex; justify-content: center; }

        /* PROGRAM WIDGET */
        .program-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .prog-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; transition: all 0.3s; position: relative; overflow: hidden;}
        .prog-card:hover { border-color: var(--theme-color); transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.08);}
        .prog-card h4 { color: var(--theme-color); margin-bottom: 12px; font-size: 1.1rem; padding-right: 80px; line-height: 1.4;}
        .badge-prog { position: absolute; top: 20px; right: 20px; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        .bp-selesai { background: rgba(46, 204, 113, 0.15); color: #27ae60; }
        .bp-progress { background: rgba(246, 178, 59, 0.15); color: #d35400; }
        .bp-belum { background: #f1f5f9; color: #64748b; }

        /* KPI WIDGET */
        .kpi-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.03); margin-bottom: 20px; transition: transform 0.3s;}
        .kpi-card:hover { transform: scale(1.01); }
        .kpi-bar-bg { width: 100%; background: #e2e8f0; height: 14px; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .kpi-bar-fill { height: 100%; background: var(--theme-color); border-radius: 10px; position: relative; }
        
        /* IMAGE BLOCK */
        .img-block img { width: 100%; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); object-fit: cover; max-height: 500px; transition: 0.4s;}
        .img-block img:hover { transform: scale(1.02); }

        .loader { text-align: center; padding: 150px 20px; font-size: 1.2rem; color: #888; display: flex; flex-direction: column; align-items: center; gap: 15px;}
        footer { text-align: center; padding: 40px; color: #888; font-size: 0.9rem; margin-top: 80px; background: white; border-top: 1px solid #e2e8f0;}

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px);} to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 768px) { 
            .finance-grid { grid-template-columns: 1fr; } 
            .hero h1 { font-size: 2.2rem; } 
            .about-box { padding: 30px; margin-top: -30px; }
        }
    </style>
</head>
<body>

    <div id="loading" class="loader"><i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color: var(--theme-color);"></i> Mengambil data publikasi...</div>

    <div id="main-content" style="display: none;">
        </div>

    <footer id="footer" style="display:none;">
        <div class="container">
            <p>&copy; <span id="year"></span> | Disajikan secara transparan melalui sistem <b>Campus Innovate</b>.</p>
        </div>
    </footer>

    <script>
        const SUPABASE_URL = 'https://wnhftesxaicqffnyrdkn.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_i2-_17x_KOh0HxNw4DaaNA_vqXMBO2R'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0);
        document.getElementById('year').innerText = new Date().getFullYear();

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const workspaceId = urlParams.get('workspace');
            
            if (!workspaceId) {
                document.getElementById('loading').innerHTML = `<i class="fa-solid fa-triangle-exclamation fa-2x" style="color:#e74c3c;"></i><br>URL tidak valid. ID Workspace tidak ditemukan.`;
                return;
            }

            // Ambil Pengaturan Landing Page
            const { data: config, error: confErr } = await supabaseClient.from('landing_pages').select('*').eq('workspace_id', workspaceId).single();
            
            if (confErr || !config || !config.is_published) {
                document.getElementById('loading').innerHTML = `<i class="fa-solid fa-lock fa-2x" style="color:#f1c40f;"></i><br>Halaman belum dipublikasikan oleh Admin.`;
                return;
            }

            // Set Warna Tema
            document.documentElement.style.setProperty('--theme-color', config.theme_color);
            document.title = "Website Publik Organisasi";

            const containerHtml = document.getElementById('main-content');
            let layoutBlocks = config.layout_data || [];
            
            // Generate HTML berdasarkan urunan Drag & Drop Admin
            for (let i = 0; i < layoutBlocks.length; i++) {
                let block = layoutBlocks[i];
                let blockHtml = '';

                if (block.type === 'hero') {
                    document.title = block.title;
                    blockHtml = `<div class="hero page-block" style="margin-top:0;"><div class="container"><h1>${block.title}</h1><p>${block.subtitle}</p></div></div>`;
                } 
                else if (block.type === 'text') {
                    blockHtml = `<div class="container page-block"><div class="about-box"><i class="fa-solid fa-quote-left" style="font-size: 2.5rem; color: var(--theme-color); opacity: 0.15; margin-bottom: 15px;"></i><p style="font-size: 1.15rem; line-height: 1.8; color: #555;">${block.content}</p></div></div>`;
                } 
                else if (block.type === 'image') {
                    blockHtml = `<div class="container page-block img-block"><img src="${block.url}" alt="Banner Organisasi"></div>`;
                } 
                else if (block.type === 'finance') {
                    // Fetch data
                    const { data: fData } = await supabaseClient.from('finance_summaries').select('*').eq('workspace_id', workspaceId).single();
                    let total = fData ? parseFloat(fData.total_rab) : 0;
                    let real = fData ? parseFloat(fData.realisasi_rab) : 0;
                    let sisa = total - real < 0 ? 0 : total - real;

                    blockHtml = `
                    <div class="container page-block">
                        <h2 class="section-title"><i class="fa-solid fa-wallet"></i> Transparansi Keuangan</h2>
                        <div class="finance-grid">
                            <div>
                                <div class="finance-card" style="margin-bottom: 20px;">
                                    <h3>Anggaran Utama (Rencana)</h3>
                                    <div class="amount">${formatRp(total)}</div>
                                </div>
                                <div class="finance-card" style="border-left-color: #2ecc71;">
                                    <h3>Realisasi Dana (Terpakai)</h3>
                                    <div class="amount" style="color: #2ecc71;">${formatRp(real)}</div>
                                </div>
                            </div>
                            <div class="chart-container">
                                <canvas id="chart-finance-${i}"></canvas>
                            </div>
                        </div>
                    </div>`;

                    // Render Chart after injecting HTML
                    setTimeout(() => {
                        new Chart(document.getElementById(`chart-finance-${i}`).getContext('2d'), {
                            type: 'doughnut',
                            data: { labels: ['Terpakai', 'Sisa/Tersedia'], datasets: [{ data: [real, sisa], backgroundColor: ['#2ecc71', '#e2e8f0'], borderWidth: 0 }] },
                            options: { maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom' } } }
                        });
                    }, 500);
                } 
                else if (block.type === 'kpi') {
                    const { data: kData } = await supabaseClient.from('kpi_items').select('*').eq('workspace_id', workspaceId);
                    let kpiHtml = '';
                    if(!kData || kData.length === 0) kpiHtml = '<p style="color:#aaa;">Belum ada target KPI.</p>';
                    else {
                        kData.forEach(kpi => {
                            let persen = kpi.target > 0 ? (kpi.capaian / kpi.target) * 100 : 0;
                            if(persen > 100) persen = 100;
                            kpiHtml += `
                            <div class="kpi-card">
                                <strong style="color: #2d3436; font-size:1.1rem;">${kpi.nama_kpi}</strong>
                                <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-top:15px; color:#777;">
                                    <span>Target: <b>${kpi.target} ${kpi.satuan}</b></span>
                                    <span style="color:${persen >= 100 ? '#2ecc71' : 'var(--theme-color)'}; font-weight:800; font-size:1rem;">${kpi.capaian} ${kpi.satuan} (${persen.toFixed(1)}%)</span>
                                </div>
                                <div class="kpi-bar-bg">
                                    <div class="kpi-bar-fill" style="width: ${persen}%; background: ${persen >= 100 ? '#2ecc71' : 'var(--theme-color)'};"></div>
                                </div>
                            </div>`;
                        });
                    }
                    blockHtml = `<div class="container page-block"><h2 class="section-title"><i class="fa-solid fa-bullseye"></i> Capaian Indikator Kinerja Utama</h2><div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;">${kpiHtml}</div></div>`;
                } 
                else if (block.type === 'program') {
                    const { data: pData } = await supabaseClient.from('programs').select('*').eq('workspace_id', workspaceId).order('tanggal_pelaksanaan', { ascending: true });
                    let progHtml = '';
                    if(!pData || pData.length === 0) progHtml = '<p style="color:#aaa;">Belum ada program kerja.</p>';
                    else {
                        pData.forEach(p => {
                            let bClass = p.status === 'Selesai' ? 'bp-selesai' : (p.status === 'Progress' ? 'bp-progress' : 'bp-belum');
                            let tgl = p.tanggal_pelaksanaan ? new Date(p.tanggal_pelaksanaan).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'}) : 'Tanggal Belum Ditentukan';
                            progHtml += `
                            <div class="prog-card">
                                <h4>${p.nama_program}</h4>
                                <span class="badge-prog ${bClass}">${p.status}</span>
                                <p style="font-size:0.85rem; color:#777; margin-top:15px; border-top:1px dashed #eee; padding-top:15px;"><i class="fa-regular fa-calendar" style="color:var(--theme-color);"></i> ${tgl}</p>
                            </div>`;
                        });
                    }
                    blockHtml = `<div class="container page-block"><h2 class="section-title"><i class="fa-solid fa-list-check"></i> Status Pelaksanaan Program Kerja</h2><div class="program-grid">${progHtml}</div></div>`;
                }

                containerHtml.innerHTML += blockHtml;
            }

            if(layoutBlocks.length === 0) {
                containerHtml.innerHTML = `<div class="container" style="text-align:center; padding:100px 0;"><h2 style="color:#aaa;">Website masih kosong. Admin belum menambahkan desain.</h2></div>`;
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('footer').style.display = 'block';
        });
    </script>
</body>
</html>
