<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Publikasi & Transparansi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --theme-color: #0A3055; --bg-body: #f8fafc; --text: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-body); color: var(--text); overflow-x: hidden; scroll-behavior: smooth;}

        /* LAYOUT & UTILITIES */
        .page-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .dynamic-block { margin: 30px auto; overflow: hidden; position: relative; animation: fadeUp 0.8s ease-out forwards; opacity: 0; transform: translateY(30px);}
        
        /* HERO SECTION */
        .hero-layout { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white; position: relative; background-size: cover; background-position: center; min-height: 400px;}
        .hero-layout::before { content: ''; position: absolute; top:0; left:0; right:0; bottom:0; background: linear-gradient(135deg, rgba(10,48,85,0.9), rgba(0,0,0,0.6)); z-index: 1;}
        .hero-content { position: relative; z-index: 2; max-width: 800px; padding: 20px;}
        .hero-content h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 20px; line-height: 1.2; text-shadow: 0 4px 15px rgba(0,0,0,0.3);}
        .hero-content p { font-size: 1.2rem; opacity: 0.9; }

        /* TYPOGRAPHY */
        .section-heading { font-size: 2rem; font-weight: 800; color: var(--text); margin-bottom: 30px; display: flex; align-items: center; gap: 15px;}
        .section-heading::after { content: ''; flex: 1; height: 3px; background: linear-gradient(90deg, var(--theme-color), transparent); opacity: 0.2; border-radius: 3px;}

        /* GRID NEWS */
        .news-grid { display: grid; gap: 25px; }
        .news-card { background: white; border-radius: inherit; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; height: 100%; display: flex; flex-direction: column;}
        .news-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .news-image { height: 200px; background-color: #eee; background-size: cover; background-position: center; }
        .news-body { padding: 25px; display: flex; flex-direction: column; flex-grow: 1;}
        .news-meta { font-size: 0.8rem; color: #64748b; font-weight: 600; text-transform: uppercase; margin-bottom: 10px; display: flex; gap: 10px;}
        .news-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 10px; line-height: 1.4; color: var(--text);}
        .news-desc { font-size: 0.95rem; color: #475569; line-height: 1.6; margin-bottom: 20px; flex-grow: 1;}

        /* STRUKTUR ORGANISASI */
        .struktur-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; text-align: center;}
        .member-card { background: white; padding: 30px 20px; border-radius: inherit; box-shadow: 0 5px 20px rgba(0,0,0,0.03); border-top: 4px solid var(--theme-color);}
        .member-avatar { width: 80px; height: 80px; background: #e2e8f0; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #94a3b8;}
        .member-name { font-weight: 800; font-size: 1.1rem; color: var(--text); margin-bottom: 5px;}
        .member-role { font-size: 0.85rem; color: #64748b; font-weight: 600; text-transform: uppercase;}

        /* WIDGETS */
        .data-grid-2 { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }
        .stat-card { background: white; padding: 30px; border-radius: inherit; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between;}
        .stat-card .amount { font-size: 2.5rem; font-weight: 800; color: var(--theme-color); }
        .prog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px;}
        .prog-item { background: white; padding: 25px; border-radius: inherit; border-left: 5px solid var(--theme-color); box-shadow: 0 5px 15px rgba(0,0,0,0.03);}
        .badge-status { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; display: inline-block; margin-top: 10px;}
        
        .kpi-card { background: white; padding: 25px; border-radius: inherit; box-shadow: 0 8px 25px rgba(0,0,0,0.03); margin-bottom: 20px; }
        .kpi-bar-bg { width: 100%; background: #e2e8f0; height: 14px; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .kpi-bar-fill { height: 100%; background: var(--theme-color); border-radius: 10px; }

        .widget-newsletter { background: white; padding: 25px; border-left: 5px solid #e67e22; border-radius: inherit; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }

        /* LOADING & FOOTER */
        .loader-screen { position: fixed; inset:0; background:white; z-index: 9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--theme-color); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;}
        footer { background: #0f172a; color: #94a3b8; padding: 60px 20px; text-align: center; margin-top: 80px;}
        
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.2rem; }
            .data-grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="loader" class="loader-screen">
        <div class="spinner"></div>
        <h3 style="color: var(--theme-color);">Menyiapkan Ruang Publik...</h3>
    </div>

    <div id="main-content"></div>

    <footer id="footer" style="display:none;">
        <div class="page-container">
            <h3 style="color: white; margin-bottom: 15px; font-weight: 800;">Campus Innovate</h3>
            <p>Mendukung digitalisasi dan transparansi sistem informasi organisasi kampus.</p>
            <p style="margin-top: 30px; font-size: 0.85rem; opacity: 0.5;">&copy; <span id="year"></span> Hak Cipta Dilindungi.</p>
        </div>
    </footer>

    <script>
        const SUPABASE_URL = 'https://wnhftesxaicqffnyrdkn.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_i2-_17x_KOh0HxNw4DaaNA_vqXMBO2R'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0);
        document.getElementById('year').innerText = new Date().getFullYear();

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const workspaceId = urlParams.get('workspace');
            
            if (!workspaceId) {
                document.getElementById('loader').innerHTML = `<h2 style="color:red;">Akses Ditolak: Parameter Workspace ID Hilang!</h2>`; return;
            }

            const { data: config } = await supabaseClient.from('landing_pages').select('*').eq('workspace_id', workspaceId).single();
            if (!config || !config.is_published) {
                document.getElementById('loader').innerHTML = `<h2>Mohon Maaf, halaman ini belum dipublikasikan oleh Admin.</h2>`; return;
            }

            const containerHtml = document.getElementById('main-content');
            let rawBlocks = config.layout_data || [];
            
            // FIX ERROR: Backward Compatibility Parser untuk memastikan render tidak gagal membaca data versi lama
            let blocks = rawBlocks.map(b => {
                if (!b.styles) b.styles = { bg: 'transparent', padding: '20px', borderRadius: '15px' };
                if (!b.data) {
                    b.data = {};
                    if(b.title !== undefined) b.data.title = b.title;
                    if(b.subtitle !== undefined) b.data.subtitle = b.subtitle;
                    if(b.content !== undefined) b.data.content = b.content;
                    if(b.url !== undefined) b.data.url = b.url;
                    if(b.columns !== undefined) b.data.columns = b.columns;
                    if(b.style !== undefined) b.data.style = b.style;
                    if(b.align !== undefined) b.data.align = b.align;
                    if(b.width !== undefined) b.data.width = b.width;
                }
                return b;
            });
            
            // Render Loop Engine
            for (let i = 0; i < blocks.length; i++) {
                let b = blocks[i];
                // Ekstrak styling properties
                let bBg = b.styles.bg !== '#ffffff' ? b.styles.bg : 'transparent';
                let inlineStyle = `background-color: ${bBg}; padding: ${b.styles.padding} 20px; border-radius: ${b.styles.borderRadius};`;
                
                let html = `<section class="dynamic-block" style="${inlineStyle}"><div class="page-container">`;

                if (b.type === 'hero') {
                    let bgImg = b.data.url ? `background-image: url('${b.data.url}');` : `background-color: var(--theme-color);`;
                    html = `<section class="dynamic-block hero-layout" style="border-radius: ${b.styles.borderRadius}; ${bgImg}">
                                <div class="hero-content">
                                    <h1>${b.data.title || 'Judul Organisasi'}</h1><p>${b.data.subtitle || ''}</p>
                                </div>
                            </section>`;
                } 
                else if (b.type === 'text') {
                    html += `<div style="font-size:1.15rem; line-height:1.8; color:#334155;">${(b.data.content || '').replace(/\n/g, '<br>')}</div>`;
                }
                else if (b.type === 'image') {
                    html += `<div style="text-align:${b.data.align || 'center'};"><img src="${b.data.url}" style="width:${b.data.width || '100%'}; border-radius:${b.styles.borderRadius}; box-shadow:0 10px 30px rgba(0,0,0,0.1); max-height:500px; object-fit:cover;"></div>`;
                }
                else if (b.type === 'video') {
                    html += `<div><iframe src="${b.data.url}" style="width:100%; height:400px; border-radius:${b.styles.borderRadius}; border:none; box-shadow:0 5px 20px rgba(0,0,0,0.1);"></iframe></div>`;
                }
                else if (b.type === 'newsletter') {
                    html += `<div class="widget-newsletter" style="border-radius:${b.styles.borderRadius};"><h3 style="margin-bottom:10px; color:#e67e22;"><i class="fa-solid fa-bullhorn"></i> ${b.data.title}</h3><p style="color:#64748b;">${b.data.content}</p></div>`;
                }
                else if (b.type === 'divider') {
                    html += `<hr style="border:0; border-top: 3px ${b.data.style || 'solid'} #cbd5e1; margin: 10px 0;">`;
                }
                else if (b.type === 'grid-news') {
                    let cols = b.data.columns || '3';
                    html += `<h2 class="section-heading">${b.data.title || 'Kabar Terbaru'}</h2>
                             <div class="news-grid" style="grid-template-columns: repeat(auto-fit, minmax(${cols==='4'?'230px':'300px'}, 1fr));">`;
                    
                    // Contoh Layout Grid Dummy Berita
                    for(let j=1; j<=parseInt(cols); j++) {
                        html += `
                        <div class="news-card" style="border-radius: ${b.styles.borderRadius};">
                            <div class="news-image" style="background-image: url('https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=500&q=80');"></div>
                            <div class="news-body">
                                <div class="news-meta"><span><i class="fa-solid fa-calendar"></i> Hari Ini</span></div>
                                <h3 class="news-title">Agenda Strategis Organisasi Bagian ${j}</h3>
                                <p class="news-desc">Informasi terkait agenda yang akan dilaksanakan untuk mendorong kemajuan organisasi.</p>
                            </div>
                        </div>`;
                    }
                    html += `</div>`;
                }
                else if (b.type === 'struktur') {
                    html += `<h2 class="section-heading">${b.data.title || 'Struktur Kabinet'}</h2><div class="struktur-grid">`;
                    const { data: members } = await supabaseClient.from('workspace_members').select('*').eq('workspace_id', workspaceId);
                    if(members && members.length > 0) {
                        members.forEach(m => {
                            html += `<div class="member-card" style="border-radius: ${b.styles.borderRadius};"><div class="member-avatar"><i class="fa-solid fa-user"></i></div><div class="member-name">${m.nama_user || 'Anggota'}</div><div class="member-role">${m.role}</div></div>`;
                        });
                    } else {
                        html += `<p style="color:#777;">Data kepengurusan belum tersedia di dashboard internal.</p>`;
                    }
                    html += `</div>`;
                }
                else if (b.type === 'finance') {
                    const { data: fData } = await supabaseClient.from('finance_summaries').select('*').eq('workspace_id', workspaceId).single();
                    let total = fData ? parseFloat(fData.total_rab) : 0; let real = fData ? parseFloat(fData.realisasi_rab) : 0;
                    html += `
                        <h2 class="section-heading"><i class="fa-solid fa-wallet"></i> Transparansi Keuangan</h2>
                        <div class="data-grid-2">
                            <div>
                                <div class="stat-card" style="border-radius: ${b.styles.borderRadius}; border-left: 6px solid #e2e8f0;">
                                    <div><h3 style="color:#64748b; font-size:1rem; margin-bottom:5px;">Rencana Anggaran</h3><div class="amount" style="color:#1e293b;">${formatRp(total)}</div></div>
                                </div>
                                <div class="stat-card" style="border-radius: ${b.styles.borderRadius}; border-left: 6px solid #2ecc71;">
                                    <div><h3 style="color:#64748b; font-size:1rem; margin-bottom:5px;">Realisasi / Terpakai</h3><div class="amount" style="color:#2ecc71;">${formatRp(real)}</div></div>
                                </div>
                            </div>
                            <div class="stat-card" style="justify-content:center; border-radius: ${b.styles.borderRadius};"><canvas id="chart-fin-${i}" style="max-height:220px;"></canvas></div>
                        </div>`;
                    
                    setTimeout(() => {
                        new Chart(document.getElementById(`chart-fin-${i}`).getContext('2d'), {
                            type: 'doughnut', data: { labels: ['Terpakai', 'Tersisa'], datasets: [{ data: [real, total-real<0?0:total-real], backgroundColor: ['#2ecc71', '#e2e8f0'] }] },
                            options: { plugins: { legend: { position: 'bottom'} } }
                        });
                    }, 500);
                }
                else if (b.type === 'kpi') {
                    const { data: kData } = await supabaseClient.from('kpi_items').select('*').eq('workspace_id', workspaceId);
                    let kpiHtml = '';
                    if(!kData || kData.length === 0) kpiHtml = '<p style="color:#aaa;">Belum ada target KPI yang ditetapkan.</p>';
                    else {
                        kData.forEach(kpi => {
                            let persen = kpi.target > 0 ? (kpi.capaian / kpi.target) * 100 : 0;
                            if(persen > 100) persen = 100;
                            kpiHtml += `
                            <div class="kpi-card" style="border-radius: ${b.styles.borderRadius};">
                                <strong style="color: #2d3436; font-size:1.1rem;">${kpi.nama_kpi}</strong>
                                <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-top:15px; color:#777;">
                                    <span>Target: <b>${kpi.target} ${kpi.satuan}</b></span>
                                    <span style="color:${persen >= 100 ? '#2ecc71' : 'var(--theme-color)'}; font-weight:800;">${kpi.capaian} ${kpi.satuan} (${persen.toFixed(1)}%)</span>
                                </div>
                                <div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width: ${persen}%; background: ${persen >= 100 ? '#2ecc71' : 'var(--theme-color)'};"></div></div>
                            </div>`;
                        });
                    }
                    html += `<h2 class="section-heading"><i class="fa-solid fa-bullseye"></i> Indikator Kinerja (KPI)</h2><div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;">${kpiHtml}</div>`;
                }
                else if (b.type === 'program') {
                    const { data: pData } = await supabaseClient.from('programs').select('*').eq('workspace_id', workspaceId);
                    html += `<h2 class="section-heading"><i class="fa-solid fa-list-check"></i> Status Program Kerja</h2><div class="prog-grid">`;
                    if(pData && pData.length > 0) {
                        pData.forEach(p => {
                            let bg = p.status==='Selesai'?'#dcfce7':(p.status==='Progress'?'#fef3c7':'#f1f5f9');
                            let col = p.status==='Selesai'?'#166534':(p.status==='Progress'?'#92400e':'#475569');
                            html += `<div class="prog-item" style="border-radius: ${b.styles.borderRadius};">
                                <h3 style="font-size:1.1rem; margin-bottom:10px; color:var(--text);">${p.nama_program}</h3>
                                <p style="font-size:0.85rem; color:#64748b;"><i class="fa-regular fa-calendar"></i> ${p.tanggal_pelaksanaan || 'Belum diatur'}</p>
                                <span class="badge-status" style="background:${bg}; color:${col};">${p.status}</span>
                            </div>`;
                        });
                    } else { html += `<p style="color:#777;">Belum ada rekapitulasi data program kerja.</p>`; }
                    html += `</div>`;
                }

                if(b.type !== 'hero') html += `</div></section>`;
                containerHtml.innerHTML += html;
            }

            document.querySelectorAll('.dynamic-block').forEach((el, index) => { el.style.animationDelay = `${index * 0.1s}`; });

            document.getElementById('loader').style.display = 'none';
            document.getElementById('footer').style.display = 'block';
        });
    </script>
</body>
</html>
