<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Campus Innovate</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #0A3055; --secondary: #F6B23B; --bg: #f4f7fa; --text: #333; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); display: flex; color: var(--text); }
        .sidebar { width: 250px; background: var(--primary); height: 100vh; padding: 20px; color: var(--white); position: fixed; }
        .sidebar h2 { color: var(--secondary); margin-bottom: 30px; font-size: 1.5rem; }
        .nav-item { padding: 12px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: var(--secondary); }
        .main-content { margin-left: 250px; padding: 30px; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-card h3 { color: #777; font-size: 1rem; }
        .stat-card p { font-size: 2rem; font-weight: bold; color: var(--primary); }
        .panel { background: var(--white); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        th { background: var(--bg); color: var(--primary); }
        .btn-action { padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-del { background: #ff4757; color: white; }
        .btn-excel { background: #2ed573; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; cursor: pointer; float: right; border: none; font-weight: bold;}
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>CI Super Admin</h2>
        <div class="nav-item active"><i class="fa-solid fa-chart-line"></i> Monitoring Pusat</div>
        <div class="nav-item" onclick="handleLogout()"><i class="fa-solid fa-sign-out-alt"></i> Keluar</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Sistem Monitoring Global</h1>
            <div class="user-profile" style="background: var(--primary); color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold;"><i class="fa-solid fa-shield-halved"></i> Super Administrator</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>Total Organisasi (Workspace)</h3><p id="totalWorkspace"><i class="fa-solid fa-spinner fa-spin" style="font-size: 1.5rem;"></i></p></div>
            <div class="stat-card"><h3>Admin Terdaftar</h3><p id="totalAdmin"><i class="fa-solid fa-spinner fa-spin" style="font-size: 1.5rem;"></i></p></div>
            <div class="stat-card"><h3>Pengurus/Anggota Aktif</h3><p id="totalUser"><i class="fa-solid fa-spinner fa-spin" style="font-size: 1.5rem;"></i></p></div>
        </div>

        <div class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Manajemen Workspace & Admin</h2>
                <button class="btn-excel" onclick="exportToCSV()"><i class="fa-solid fa-file-excel"></i> Download Excel</button>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>ID Workspace</th>
                        <th>Nama Organisasi</th>
                        <th>ID Admin Pengelola</th>
                        <th>Tanggal Dibuat</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    <tr><td colspan="5" style="text-align: center; color: #777;">Memuat data dari server...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 1. KONEKSI SUPABASE (Ubah nama variabel jadi supabaseClient)
        const SUPABASE_URL = 'https://wnhftesxaicqffnyrdkn.supabase.co'; // Masukkan URL kamu
        const SUPABASE_KEY = 'sb_publishable_i2-_17x_KOh0HxNw4DaaNA_vqXMBO2R'; // Masukkan KEY kamu
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Variabel global untuk menyimpan data sementara (untuk Export Excel)
        let globalData = [];

        // 2. KEAMANAN: CEK STATUS LOGIN & ROLE
        document.addEventListener('DOMContentLoaded', async () => {
            // Gunakan supabaseClient
            const { data: { session } } = await supabaseClient.auth.getSession();
            
            if (!session) {
                alert("Sesi habis. Silakan login kembali.");
                window.location.href = 'index.html';
                return;
            }

            // Validasi apakah user ini benar-benar Super Admin
            const { data: roleData } = await supabaseClient
                .from('user_roles')
                .select('role')
                .eq('user_id', session.user.id)
                .single();

            if (!roleData || roleData.role !== 'superadmin') {
                alert("Peringatan Keamanan: Anda bukan Super Admin!");
                window.location.href = 'index.html';
                return;
            }

            // Jika aman, muat data dashboard
            loadDashboardData();
        });

        // 3. FUNGSI MEMUAT DATA STATISTIK & TABEL
        async function loadDashboardData() {
            try {
                // Hitung total role Admin dan User menggunakan supabaseClient
                const { count: countAdmin } = await supabaseClient.from('user_roles').select('*', { count: 'exact', head: true }).eq('role', 'admin');
                const { count: countUser } = await supabaseClient.from('user_roles').select('*', { count: 'exact', head: true }).eq('role', 'user');
                
                // Ambil semua data Workspace
                const { data: workspaces, count: countWorkspace, error } = await supabaseClient.from('workspaces').select('*', { count: 'exact' });

                // Tampilkan angka ke layar
                document.getElementById('totalAdmin').innerText = countAdmin || 0;
                document.getElementById('totalUser').innerText = countUser || 0;
                document.getElementById('totalWorkspace').innerText = countWorkspace || 0;

                // Render Tabel
                const tableBody = document.getElementById('adminTableBody');
                tableBody.innerHTML = '';
                
                if (workspaces && workspaces.length > 0) {
                    globalData = workspaces; // Simpan untuk Excel
                    workspaces.forEach(ws => {
                        const dateObj = new Date(ws.created_at).toLocaleDateString('id-ID');
                        tableBody.innerHTML += `
                            <tr>
                                <td style="font-family: monospace; color: #777;">${ws.id.substring(0, 8)}...</td>
                                <td><strong>${ws.nama_organisasi}</strong></td>
                                <td style="font-family: monospace;">${ws.admin_id.substring(0, 8)}...</td>
                                <td>${dateObj}</td>
                                <td>
                                    <button class="btn-action btn-del" onclick="deleteWorkspace('${ws.id}', '${ws.nama_organisasi}')">Hapus</button>
                                </td>
                            </tr>
                        `;
                    });
                } else {
                    tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Belum ada Organisasi yang terdaftar.</td></tr>';
                }
            } catch (err) {
                console.error("Gagal memuat data:", err);
            }
        }

        // 4. FUNGSI HAPUS WORKSPACE
        async function deleteWorkspace(workspaceId, namaOrg) {
            const confirmDelete = confirm(`Apakah Anda yakin ingin MENGHAPUS organisasi "${namaOrg}" beserta seluruh isinya? Ini tidak bisa dibatalkan!`);
            
            if (confirmDelete) {
                const { error } = await supabaseClient.from('workspaces').delete().eq('id', workspaceId);
                if (error) {
                    alert("Gagal menghapus: " + error.message);
                } else {
                    alert("Organisasi berhasil dihapus beserta seluruh datanya!");
                    loadDashboardData(); // Refresh tabel
                }
            }
        }

        // 5. FUNGSI EXPORT KE EXCEL (CSV)
        function exportToCSV() {
            if (globalData.length === 0) {
                alert("Tidak ada data untuk di-download.");
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "ID Workspace,Nama Organisasi,ID Admin (User),Tanggal Dibuat,Punya Landing Page?,Punya Dashboard?\n";

            globalData.forEach(function(row) {
                const dateOnly = new Date(row.created_at).toLocaleDateString('id-ID');
                let rowData = `"${row.id}","${row.nama_organisasi}","${row.admin_id}","${dateOnly}","${row.has_landing_page}","${row.has_dashboard}"`;
                csvContent += rowData + "\r\n";
            });

            var encodedUri = encodeURI(csvContent);
            var link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Laporan_Workspace_CampusInnovate.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 6. FUNGSI LOGOUT
        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
