<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Innovate - Gerbang Sistem</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --primary: #0A3055; --secondary: #F6B23B; --bg: #f4f7fa; --text: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .auth-container { display: flex; width: 90%; max-width: 1000px; height: 600px; background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .brand-panel { flex: 1; background: var(--primary); color: white; padding: 40px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .brand-panel h1 { font-size: 3rem; line-height: 1.2; margin-bottom: 15px; z-index: 2; }
        .brand-panel h1 span { color: var(--secondary); }
        .brand-panel p { color: rgba(255,255,255,0.8); z-index: 2; }
        
        /* Dekorasi Lingkaran */
        .circle { position: absolute; border-radius: 50%; background: linear-gradient(135deg, rgba(246,178,59,0.2), transparent); }
        .circle-1 { width: 300px; height: 300px; top: -50px; right: -50px; }
        .circle-2 { width: 200px; height: 200px; bottom: -50px; left: -50px; }

        .form-panel { flex: 1; padding: 40px; position: relative; display: flex; align-items: center; }
        .form-wrapper { width: 100%; max-width: 350px; margin: 0 auto; position: absolute; left: 50%; transform: translateX(-50%); transition: all 0.4s ease; opacity: 0; visibility: hidden; }
        .form-wrapper.active { opacity: 1; visibility: visible; z-index: 10; }
        
        .form-wrapper h2 { color: var(--primary); margin-bottom: 5px; }
        .form-wrapper p.subtitle { color: #777; margin-bottom: 25px; font-size: 0.9rem; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #aaa; transition: 0.3s; }
        .input-group input { width: 100%; padding: 12px 15px 12px 45px; border: 2px solid #eee; border-radius: 10px; font-size: 0.95rem; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--secondary); }
        .input-group input:focus + i { color: var(--secondary); }
        
        /* Gaya untuk Pilihan Role */
        .role-selection { display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; background: var(--bg); padding: 10px; border-radius: 10px;}
        .role-selection label { cursor: pointer; font-size: 0.85rem; color: var(--primary); font-weight: 500; display: flex; align-items: center; gap: 5px;}
        .role-selection input[type="radio"] { accent-color: var(--secondary); }

        .btn-primary { width: 100%; padding: 12px; background: var(--secondary); color: var(--primary); border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 5px; font-size: 1rem; }
        .btn-primary:hover { background: #e0a235; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(246, 178, 59, 0.3); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .switch-text { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #777; }
        .switch-text span { color: var(--primary); font-weight: 600; cursor: pointer; transition: 0.3s; }
        .switch-text span:hover { color: var(--secondary); text-decoration: underline; }

        .system-status { margin-top: 15px; text-align: center; font-size: 0.85rem; font-weight: 500; display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand-panel">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <i class="fa-solid fa-chart-pie" style="font-size: 3rem; color: var(--secondary); margin-bottom: 20px; z-index: 2;"></i>
            <h1>Campus <br><span>Innovate</span></h1>
            <p>Sistem Manajemen ERP & Workspace Terpadu untuk Organisasi.</p>
        </div>

        <div class="form-panel">
            
            <div class="form-wrapper active" id="login-form">
                <h2>Selamat Datang 👋</h2>
                <p class="subtitle">Masuk untuk mengakses ruang kerja Anda.</p>
                <form onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-primary" id="btn-login">Masuk ke Sistem</button>
                    <p class="system-status" id="login-status" style="color: var(--primary);"><i class="fa-solid fa-spinner fa-spin"></i> Mengecek otoritas...</p>
                </form>
                <p class="switch-text">Belum punya akun? <span onclick="switchForm('register')">Daftar Akun Baru</span></p>
            </div>

            <div class="form-wrapper" id="register-form">
                <h2>Buat Akun Baru 🚀</h2>
                <p class="subtitle">Daftarkan diri Anda untuk masuk ke sistem.</p>
                <form onsubmit="handleRegister(event)">
                    
                    <div class="role-selection">
                        <label title="Dapat membuat Ruang Kerja (Workspace) baru">
                            <input type="radio" name="userRole" value="admin" checked> Admin Organisasi
                        </label>
                        <label title="Dapat bergabung ke Ruang Kerja yang sudah ada">
                            <input type="radio" name="userRole" value="user"> Anggota Biasa
                        </label>
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="reg-name" placeholder="Nama Lengkap" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="Buat Password" required>
                    </div>
                    <button type="submit" class="btn-primary" id="btn-register">Daftar Sekarang</button>
                </form>
                <p class="switch-text">Sudah punya akun? <span onclick="switchForm('login')">Masuk di sini</span></p>
            </div>

        </div>
    </div>

    <script>
        // 1. KONEKSI SUPABASE
        const SUPABASE_URL = 'https://wnhftesxaicqffnyrdkn.supabase.co'; // UBAH INI
        const SUPABASE_KEY = 'sb_publishable_i2-_17x_KOh0HxNw4DaaNA_vqXMBO2R'; // UBAH INI
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. FUNGSI TRANSISI FORM UI
        function switchForm(target) {
            document.getElementById('login-form').classList.remove('active');
            document.getElementById('register-form').classList.remove('active');
            document.getElementById(`${target}-form`).classList.add('active');
        }

        // 3. FUNGSI LOGIN & CEK ROLE
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-login');
            const status = document.getElementById('login-status');

            btn.disabled = true;
            status.style.display = 'block';

            // Proses Autentikasi
            const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (authError) {
                alert("Login gagal: " + authError.message);
                btn.disabled = false;
                status.style.display = 'none';
                return;
            }

            // Pengecekan Role di tabel user_roles
            const { data: roleData, error: roleError } = await supabaseClient
                .from('user_roles')
                .select('role')
                .eq('user_id', authData.user.id)
                .single();

            if (roleError || !roleData) {
                alert("Akses Ditolak: Role Anda belum diatur oleh sistem.");
                await supabaseClient.auth.signOut();
                btn.disabled = false;
                status.style.display = 'none';
                return;
            }

            // ROUTING BERDASARKAN ROLE
            const userRole = roleData.role;
            if (userRole === 'superadmin') {
                window.location.href = 'superadmin.html';
            } else if (userRole === 'admin') {
                window.location.href = 'admin.html';
            } else {
                // ANGGOTA BIASA DIARAHKAN KE LOBI ANGGOTA
                window.location.href = 'user-hub.html'; 
            }
        }

        // 4. FUNGSI REGISTER (Membaca Pilihan Role)
        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            
            // Membaca radio button mana yang dipilih (admin atau user)
            const selectedRole = document.querySelector('input[name="userRole"]:checked').value;
            
            const btn = document.getElementById('btn-register');

            btn.disabled = true;
            btn.innerText = "Mendaftarkan...";

            // Sign Up ke Supabase Auth
            const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: { data: { full_name: name } }
            });

            if (authError) {
                alert("Gagal mendaftar: " + authError.message);
                btn.disabled = false;
                btn.innerText = "Daftar Sekarang";
                return;
            }

            // Masukkan ke tabel user_roles berdasarkan pilihan User
            const { error: insertError } = await supabaseClient
                .from('user_roles')
                .insert([{ user_id: authData.user.id, role: selectedRole }]);

            if (insertError) {
                console.error("Gagal menetapkan role:", insertError);
            }

            // Pesan sukses yang dinamis
            const roleName = selectedRole === 'admin' ? "Admin Organisasi" : "Anggota Biasa";
            alert(`Pendaftaran berhasil! Anda terdaftar sebagai ${roleName}. Silakan Login.`);
            
            e.target.reset();
            switchForm('login');
            btn.disabled = false;
            btn.innerText = "Daftar Sekarang";
        }
    </script>
</body>
</html>
